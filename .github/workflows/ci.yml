name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint:
    name: Lint (ESLint)
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build (Node 20)
    runs-on: self-hosted
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Backup current deployment
        shell: powershell
        run: |
          $backupRoot = 'C:\Backups\MyReactApp'
          $backup = Join-Path 'C:\Backups\MyReactApp' (Get-Date -Format 'yyyyMMddHHmmss')
          New-Item -ItemType Directory -Force -Path $backupRoot
          New-Item -ItemType Directory -Force -Path $backup
          if (Test-Path 'C:\inetpub\wwwroot\careai.vn') {
            robocopy C:\inetpub\wwwroot\careai.vn $backup /E
            if ($LASTEXITCODE -lt 8) { exit 0 } else { exit $LASTEXITCODE }
          }
          Write-Host 'No current deployment found. Skipping backup.'

      - name: Deploy
        shell: powershell
        run: |
          robocopy dist C:\inetpub\wwwroot\careai.vn /MIR
          if ($LASTEXITCODE -lt 8) { exit 0 } else { exit $LASTEXITCODE }

      - name: Verify deployment
        shell: powershell
        run: |
          if (!(Test-Path "C:\inetpub\wwwroot\careai.vn\index.html")) {
            throw "Deployment failed: index.html not found."
          }
